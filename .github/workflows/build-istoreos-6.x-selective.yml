name: Build iStore OS 6.x

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择要编译的设备板块'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cyber3588-aib
          - easepi_a2
          - lubancat-2n
          - r5s
          - r5c
          - r4s
          - r2s
          - r2c
          - x86_64
          - fastrhino_r66s
          - fastrhino_r68s
          - photonicat
          - sige7
          - station_p2
          # 添加更多设备板块...
      clean_build:
        description: '是否清理缓存重新编译'
        required: false
        default: false
        type: boolean
      # ssh:
        # description: 'SSH connection to Actions'
        # required: false
        # default: 'false'
 # schedule:
 #  - cron: 0 16 * * *

env:
  REPO_URL: https://github.com/xiaobao1980/istoreos-xiaobao
  # REPO_BRANCH: main
  FEEDS_CONF: feeds.conf
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1-6.x.sh
  DIY_P2_SH: diy-part2-6.x.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  # 第一步：生成动态矩阵
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 生成编译矩阵
        id: set-matrix
        run: |
          # 定义所有可用的设备
          ALL_DEVICES='[
            {"DEVICE":"cyber3588-aib","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"cyber3588-aib.config"},
            {"DEVICE":"easepi_a2","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"easepi_a2.config"},
            {"DEVICE":"lubancat-2n","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"lubancat-2n.config"},
            {"DEVICE":"r5s","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"r5s.config"},
            {"DEVICE":"r5c","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"r5c.config"},
            {"DEVICE":"r4s","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"r4s.config"},
            {"DEVICE":"r2s","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"r2s.config"},
            {"DEVICE":"r2c","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"r2c.config"},
            {"DEVICE":"x86_64","ARCHITECTURE":"x86_64","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"x86_64.config"},
            {"DEVICE":"fastrhino_r66s","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"fastrhino_r66s.config"},
            {"DEVICE":"fastrhino_r68s","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"fastrhino_r68s.config"},
            {"DEVICE":"photonicat","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"photonicat.config"},
            {"DEVICE":"sige7","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"sige7.config"},
            {"DEVICE":"station_p2","ARCHITECTURE":"armv8","REPO_BRANCH":"istoreos-24.10","CONFIG_FILE":"station_p2.config"}
          ]'
          
          BUILD_TARGET="${{ github.event.inputs.build_target }}"
          
          if [ "$BUILD_TARGET" == "all" ] || [ -z "$BUILD_TARGET" ]; then
            # 编译全部设备
            echo "matrix=$ALL_DEVICES" >> $GITHUB_OUTPUT
            echo "📋 将编译所有设备"
          else
            # 只编译指定设备
            SELECTED_DEVICE=$(echo "$ALL_DEVICES" | jq --arg target "$BUILD_TARGET" '[.[] | select(.DEVICE == $target)]')
            if [ "$SELECTED_DEVICE" == "[]" ]; then
              echo "❌ 错误: 未找到设备 '$BUILD_TARGET'"
              exit 1
            fi
            echo "matrix=$SELECTED_DEVICE" >> $GITHUB_OUTPUT
            echo "📋 将编译设备: $BUILD_TARGET"
          fi

  # 第二步：执行编译
  build:
    needs: generate-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
    - name: 显示编译信息
      run: |
        echo "=========================================="
        echo "📱 设备板块: ${{ matrix.DEVICE }}"
        echo "🏗️ 架构类型: ${{ matrix.ARCHITECTURE }}"
        echo "🌳 源码分支: ${{ matrix.REPO_BRANCH }}"
        echo "📋 配置文件: ${{ matrix.CONFIG_FILE }}"
        echo "🔧 清理缓存: ${{ github.event.inputs.clean_build }}"
        echo "📅 编译时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "=========================================="

    - name: 合并磁盘
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: 准备完成
      uses: actions/checkout@main

    - name: 创建工作目录
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/workdir
        chmod 755 ${GITHUB_WORKSPACE}/workdir
        echo "WORKDIR_PATH=$PWD" >> $GITHUB_ENV

    - name: 检查服务器配置
      run: |
        echo "若分配的服务器性能不足，务必及时取消，重新运行！"
        echo -e "------------------------------- CPU信息 -------------------------------\n"
        echo "CPU物理数量:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPU核心及版本信息: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo -e "------------------------------- 内存信息 -------------------------------\n"
        echo "已安装内存详细信息: "
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo -e "------------------------------- 磁盘信息 -------------------------------\n"
        echo -e "磁盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "------------------------------- 磁盘详情 -------------------------------\n"
        df -Th

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        echo "------------------------------- 更新并安装依赖 -------------------------------"
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/depends/ubuntu-22.04)
        wget https://bootstrap.pypa.io/pip/3.6/get-pip.py
        sudo python3 get-pip.py
        sudo rm -rf get-pip.py
        sudo pip install pyelftools
        echo "------------------------------- 清理Docker镜像和软件 -------------------------------"
        [ -n "$(docker images -q)" ] && docker rmi $(docker images -q)
        docker image prune -a -f
        sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* adoptopenjdk* mysql* php* mongodb* dotnet* moby* snapd* android* || true
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        echo "------------------------------- 设置时区 -------------------------------"
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆源码
      working-directory: ${{ env.WORKDIR_PATH }}/workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b ${{ matrix.REPO_BRANCH }} openwrt
        ln -sf ${{ env.WORKDIR_PATH }}/workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存构建动作
      if: github.event.inputs.clean_build != 'true'
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: ubuntu-22.04-${{ matrix.DEVICE }}-${{ matrix.REPO_BRANCH }}
        prefix: ${{ github.workspace }}/openwrt

    - name: 清理缓存（如选择重新编译）
      if: github.event.inputs.clean_build == 'true'
      run: |
        echo "🧹 清理编译缓存，执行全新编译..."
        rm -rf ${{ github.workspace }}/openwrt/.ccache
        rm -rf ${{ github.workspace }}/openwrt/build_dir

    - name: 加载自定义 feeds
      env:
        FEEDS_CONF_PATH: ${{ matrix.ARCHITECTURE }}/feeds.conf
      run: |
        [ -e $FEEDS_CONF_PATH ] && mv $FEEDS_CONF_PATH openwrt/feeds.conf
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置
      env:
        # 优先使用设备专属配置文件路径
        DEVICE_CONFIG_PATH: configs/${{ matrix.DEVICE }}/.config
        ARCH_CONFIG_PATH: ${{ matrix.ARCHITECTURE }}/.config
      run: |
        [ -e files ] && mv files openwrt/files
        
        # 检查设备专属配置是否存在，否则使用架构通用配置
        if [ -e "$DEVICE_CONFIG_PATH" ]; then
          echo "📋 使用设备专属配置: $DEVICE_CONFIG_PATH"
          mv $DEVICE_CONFIG_PATH openwrt/.config
        elif [ -e "$ARCH_CONFIG_PATH" ]; then
          echo "📋 使用架构通用配置: $ARCH_CONFIG_PATH"
          mv $ARCH_CONFIG_PATH openwrt/.config
        else
          echo "⚠️ 警告: 未找到配置文件，使用默认配置"
        fi
        
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 根据设备名称设置目标
        echo "CONFIG_TARGET_${{ matrix.ARCHITECTURE }}=y" >> .config
        echo "CONFIG_TARGET_${{ matrix.ARCHITECTURE }}_DEVICE_${{ matrix.DEVICE }}=y" >> .config

    # - name: SSH 连接到 Actions
      # uses: P3TERX/ssh2actions@main
      # if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      # env:
        # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 下载软件包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE_NAME=${{ matrix.DEVICE }}" >> $GITHUB_ENV
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 检查磁盘空间
      if: (!cancelled())
      run: df -hT

    - name: 上传 bin 文件夹
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ matrix.DEVICE }}_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ matrix.DEVICE }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H.%M")-${{ matrix.DEVICE }}" >> ${GITHUB_OUTPUT}
        touch release.txt
        echo "
        📱 设备: ${{ matrix.DEVICE }}
        
        🏗️ 架构: ${{ matrix.ARCHITECTURE }}

        📂 源码: ${{ env.REPO_URL }}

        🌳 分支: ${{ matrix.REPO_BRANCH }}

        ⏱️ 编译时间: $(date +"%Y年%m月%d日%H时%M分")

        🌐 管理地址: 192.168.100.1

        👤 用户名: root

        🔒 密码: password

        📒 说明: 单网口设备默认网口为LAN，旁路由模式，需要接入主路由器后进后台查找对应IP地址访问，反之双网口设备默认网口为WAN+LAN，主路由模式。 " >> release.txt
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: 自动发布固件到 Releases
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 删除运行记录
      uses: xiaomeng9597/delete-workflow-runs@main
      with:
        retain_days: 20
        keep_minimum_runs: 15
        token: ${{ env.GITHUB_TOKEN }}

    - name: 删除自动发布的旧固件
      uses: dev-drprasad/delete-older-releases@v0.3.3
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 60
        delete_tags: true
