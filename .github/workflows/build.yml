name: Build iStoreOS

on:
#  schedule:
#    - cron: '0 16 * * *'  # 北京时间 00:00 (UTC+8)
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - h68k
          - h88k
          - r5s
          - r6s
          - r66s
          - lubancat-2n

env:
  REPO_URL: https://github.com/istoreos/istoreos
  REPO_BRANCH: istoreos-24.10
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev \
          libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex \
          uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev \
          xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
          antlr3 gperf wget curl swig rsync
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git istoreos https://github.com/linkease/istore.git" >> feeds.conf.default

    - name: 应用鲁班猫 2N 补丁
      if: github.event.inputs.device == 'lubancat-2n' || github.event.inputs.device == 'all'
      run: |
        echo "========== 开始应用鲁班猫 2N 补丁 =========="
        
        # 创建设备树目录
        DTS_DIR="openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        mkdir -p $DTS_DIR
        
        # 野火官方仓库基础 URL
        BASE_URL="https://raw.githubusercontent.com/LubanCat/LubanCatWrt/main/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        
        # 下载设备树文件
        echo "下载 rk3568-lubancat-2n.dts..."
        wget -q --show-progress -O $DTS_DIR/rk3568-lubancat-2n.dts $BASE_URL/rk3568-lubancat-2n.dts
        
        echo "下载 rk3568-lubancat.dtsi..."
        wget -q --show-progress -O $DTS_DIR/rk3568-lubancat.dtsi $BASE_URL/rk3568-lubancat.dtsi
        
        # 验证下载
        echo "验证设备树文件："
        ls -la $DTS_DIR/rk3568-lubancat*.dts*
        
        # 添加鲁班猫 2N 镜像定义到 rk3568.mk
        echo "添加镜像定义到 rk3568.mk..."
        cat >> openwrt/target/linux/rockchip/image/rk3568.mk << 'EOF'

        define Device/embedfire_lubancat-2n
          DEVICE_VENDOR := EmbedFire
          DEVICE_MODEL := LubanCat 2N
          SOC := rk3568
          UBOOT_DEVICE_NAME := lubancat-2n-rk3568
          IMAGE/sysupgrade.img.gz := boot-common | boot-script | pine64-img | gzip | append-metadata
          DEVICE_PACKAGES := kmod-r8125 kmod-r8169 kmod-hwmon-pwmfan kmod-thermal
        endef
        TARGET_DEVICES += embedfire_lubancat-2n
        EOF
        
        echo "========== 鲁班猫 2N 补丁应用完成 =========="

    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置文件
      run: |
        cd openwrt
        
        # 根据设备选择配置
        if [[ "${{ github.event.inputs.device }}" == "lubancat-2n" ]]; then
          echo "加载鲁班猫 2N 配置..."
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_lubancat-2n=y
          CONFIG_TARGET_KERNEL_PARTSIZE=64
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_PACKAGE_kmod-r8125=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-hwmon-pwmfan=y
          CONFIG_PACKAGE_kmod-thermal=y
          CONFIG_PACKAGE_istoreos=y
          CONFIG_PACKAGE_quickstart=y
          CONFIG_PACKAGE_luci-app-istorex=y
          EOF
        else
          # 使用默认配置或 configfiles 中的配置
          [ -e ../configfiles/config_data-6.x.txt ] && cat ../configfiles/config_data-6.x.txt >> .config
        fi
        
        make defconfig

    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        echo "固件列表："
        ls -lh *.img.gz 2>/dev/null || ls -lh

    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      with:
        tag_name: ${{ github.run_id }}-${{ github.event.inputs.device || 'all' }}
        name: iStoreOS ${{ github.event.inputs.device || 'all' }} ${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          iStoreOS 编译固件
          设备: ${{ github.event.inputs.device || 'all' }}
          分支: istoreos-24.10
          编译时间: ${{ github.event.head_commit.timestamp }}

    - name: 删除旧 Release
      uses: dev-drprasad/delete-older-releases@v0.3.2
      if: success()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
