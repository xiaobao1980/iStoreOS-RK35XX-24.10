name: Build iStoreOS

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - lubancat-2n

env:
  REPO_URL: https://github.com/xiaobao1980/istoreos-xiaobao
  REPO_BRANCH: istoreos-24.10
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev \
          libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex \
          uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev \
          xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
          antlr3 gperf wget curl swig rsync python3-dev python3-setuptools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: 安装 Python 依赖
      run: |
        pip3 install pyelftools

    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git istoreos https://github.com/linkease/istore.git" >> feeds.conf.default

    - name: 应用鲁班猫 2N 补丁
      if: github.event.inputs.device == 'lubancat-2n' || github.event.inputs.device == 'all'
      run: |
        echo "========== 开始应用鲁班猫 2N 补丁 =========="
        
        DTS_DIR="openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        mkdir -p $DTS_DIR
        
        BASE_URL="https://raw.githubusercontent.com/LubanCat/LubanCatWrt/main/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        
        echo "下载 rk3568-lubancat-2n.dts..."
        wget -q --show-progress -O $DTS_DIR/rk3568-lubancat-2n.dts $BASE_URL/rk3568-lubancat-2n.dts
        
        echo "下载 rk3568-lubancat.dtsi..."
        wget -q --show-progress -O $DTS_DIR/rk3568-lubancat.dtsi $BASE_URL/rk3568-lubancat.dtsi
        
        echo "验证设备树文件："
        ls -la $DTS_DIR/rk3568-lubancat*.dts*
        
        echo "添加镜像定义到 rk3568.mk..."
        
        printf '\ndefine Device/embedfire_lubancat-2n\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  DEVICE_VENDOR := EmbedFire\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  DEVICE_MODEL := LubanCat 2N\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  SOC := rk3568\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  UBOOT_DEVICE_NAME := lubancat-2n-rk3568\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  IMAGE/sysupgrade.img.gz := boot-common | boot-script | pine64-img | gzip | append-metadata\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf '  DEVICE_PACKAGES := kmod-r8125 kmod-r8169 kmod-hwmon-pwmfan kmod-thermal\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf 'endef\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        printf 'TARGET_DEVICES += embedfire_lubancat-2n\n' >> openwrt/target/linux/rockchip/image/rk3568.mk
        
        echo "========== 鲁班猫 2N 补丁应用完成 =========="

    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 生成鲁班猫 2N 配置
      if: github.event.inputs.device == 'lubancat-2n'
      run: |
        cd openwrt
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_lubancat-2n=y" >> .config
        echo "CONFIG_TARGET_KERNEL_PARTSIZE=64" >> .config
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024" >> .config
        echo "CONFIG_TARGET_ROOTFS_EXT4FS=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
        echo "CONFIG_PACKAGE_kmod-r8125=y" >> .config
        echo "CONFIG_PACKAGE_kmod-r8169=y" >> .config
        echo "CONFIG_PACKAGE_kmod-hwmon-pwmfan=y" >> .config
        echo "CONFIG_PACKAGE_kmod-thermal=y" >> .config
        echo "CONFIG_PACKAGE_istoreos=y" >> .config
        echo "CONFIG_PACKAGE_quickstart=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-istorex=y" >> .config

    - name: 加载默认配置
      if: github.event.inputs.device != 'lubancat-2n'
      run: |
        cd openwrt
        if [ -f ../configfiles/config_data-6.x.txt ]; then
          cat ../configfiles/config_data-6.x.txt >> .config
        fi

    - name: 配置内核
      run: |
        cd openwrt
        make defconfig

    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        ls -lh *.img.gz 2>/dev/null || ls -lh

    - name: 上传固件到 Artifacts（备用）
      if: steps.organize.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: istoreos-${{ github.event.inputs.device || 'all' }}-${{ github.run_id }}
        path: ${{ env.FIRMWARE }}/*.img.gz
        retention-days: 7

    - name: 创建 Release
      if: steps.organize.outputs.status == 'success' && env.ACCESS_TOKEN != ''
      run: |
        cd openwrt/bin/targets/*/*
        
        TAG_NAME="${{ github.run_id }}-${{ github.event.inputs.device || 'all' }}"
        RELEASE_NAME="iStoreOS ${{ github.event.inputs.device || 'all' }} ${{ github.run_id }}"
        
        # 设置 gh 命令使用 ACCESS_TOKEN
        echo "${{ secrets.ACCESS_TOKEN }}" | gh auth login --with-token
        
        # 创建 Release 并上传固件
        gh release create "$TAG_NAME" \
          --repo "${{ github.repository }}" \
          --title "$RELEASE_NAME" \
          --notes "iStoreOS 编译固件
        设备: ${{ github.event.inputs.device || 'all' }}
        分支: istoreos-24.10
        编译时间: $(date -Iseconds)" \
          *.img.gz
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    - name: 删除旧 Release
      if: success() && env.ACCESS_TOKEN != ''
      run: |
        echo "${{ secrets.ACCESS_TOKEN }}" | gh auth login --with-token
        gh release list --repo "${{ github.repository }}" --limit 20 | \
        tail -n +6 | \
        awk '{print $1}' | \
        xargs -I {} gh release delete {} --repo "${{ github.repository }}" --yes || true
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
