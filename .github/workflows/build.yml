name: Build iStoreOS

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - h68k
          - h88k
          - r5s
          - r6s
          - r66s
          - lubancat-2n

env:
  REPO_URL: https://github.com/istoreos/istoreos
  REPO_BRANCH: istoreos-24.10
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  MY_REPO: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.ACCESS_TOKEN }}

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev \
          libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex \
          uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev \
          xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
          antlr3 gperf wget curl swig rsync python3-dev python3-setuptools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: 安装 Python 依赖
      run: |
        pip3 install pyelftools

    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git istoreos https://github.com/linkease/istore.git" >> feeds.conf.default

    - name: 应用鲁班猫 2N 补丁
      if: github.event.inputs.device == 'lubancat-2n' || github.event.inputs.device == 'all'
      run: |
        echo "========== 开始应用鲁班猫 2N 补丁 =========="
        
        # 创建设备树目录
        DTS_DIR="openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        mkdir -p $DTS_DIR
        
        BASE_URL="https://raw.githubusercontent.com/LubanCat/LubanCatWrt/main/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip"
        
        # 下载设备树文件
        echo "下载设备树文件..."
        wget -q -O $DTS_DIR/rk3568-lubancat-2n.dts $BASE_URL/rk3568-lubancat-2n.dts
        wget -q -O $DTS_DIR/rk3568-lubancat.dtsi $BASE_URL/rk3568-lubancat.dtsi
        
        # 验证下载
        echo "验证设备树文件："
        ls -la $DTS_DIR/rk3568-lubancat*.dts*
        head -5 $DTS_DIR/rk3568-lubancat-2n.dts
        
        # 添加镜像定义到 rk3568.mk（确保格式正确）
        echo "添加镜像定义到 rk3568.mk..."
        cat >> openwrt/target/linux/rockchip/image/rk3568.mk << 'ENDOFMAKEFILE'

define Device/embedfire_lubancat-2n
  DEVICE_VENDOR := EmbedFire
  DEVICE_MODEL := LubanCat 2N
  SOC := rk3568
  UBOOT_DEVICE_NAME := lubancat-2n-rk3568
  IMAGE/sysupgrade.img.gz := boot-common | boot-script | pine64-img | gzip | append-metadata
  DEVICE_PACKAGES := kmod-r8125 kmod-r8169 kmod-hwmon-pwmfan kmod-thermal
endef
TARGET_DEVICES += embedfire_lubancat-2n
ENDOFMAKEFILE
        
        echo "验证 rk3568.mk 末尾："
        tail -15 openwrt/target/linux/rockchip/image/rk3568.mk
        
        echo "========== 鲁班猫 2N 补丁应用完成 =========="

    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 配置鲁班猫 2N
      if: github.event.inputs.device == 'lubancat-2n'
      run: |
        cd openwrt
        echo "========== 配置鲁班猫 2N =========="
        
        # 方法1：使用脚本自动化 menuconfig 选择
        # 先清除所有设备选择
        cat > .config << 'EOF'
CONFIG_TARGET_rockchip=y
CONFIG_TARGET_rockchip_armv8=y
# 不选择任何设备，让后续命令选择
EOF
        
        # 使用 make menuconfig 的脚本功能
        # 创建 expect 脚本或直接使用 make 命令
        make defconfig
        
        # 方法2：直接修改 .config 并强制锁定
        # 清除所有可能的设备选择
        sed -i '/CONFIG_TARGET_rockchip_armv8_DEVICE_/d' .config
        
        # 添加鲁班猫 2N 配置（强制）
        cat >> .config << 'EOF'
CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_lubancat-2n=y
CONFIG_TARGET_KERNEL_PARTSIZE=64
CONFIG_TARGET_ROOTFS_PARTSIZE=1024
CONFIG_TARGET_ROOTFS_EXT4FS=y
CONFIG_TARGET_ROOTFS_SQUASHFS=y
CONFIG_PACKAGE_kmod-r8125=y
CONFIG_PACKAGE_kmod-r8169=y
CONFIG_PACKAGE_kmod-hwmon-pwmfan=y
CONFIG_PACKAGE_kmod-thermal=y
CONFIG_PACKAGE_istoreos=y
CONFIG_PACKAGE_quickstart=y
CONFIG_PACKAGE_luci-app-istorex=y
# 禁用其他设备
# CONFIG_TARGET_rockchip_armv8_DEVICE_armsom_sige7 is not set
# CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r5s is not set
EOF
        
        # 锁定配置，防止 defconfig 覆盖
        echo "锁定配置..."
        grep "CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_lubancat-2n" .config
        
        # 使用 oldconfig 而不是 defconfig，保留手动设置
        make oldconfig
        
        echo "========== 验证最终配置 =========="
        echo "目标设备："
        grep "CONFIG_TARGET.*DEVICE" .config | grep "=y" || echo "未找到选中的设备"
        grep "lubancat" .config || echo "警告：未找到 lubancat 相关配置"

    - name: 配置其他设备
      if: github.event.inputs.device != 'lubancat-2n'
      run: |
        cd openwrt
        if [ -f ../configfiles/config_data-6.x.txt ]; then
          cat ../configfiles/config_data-6.x.txt >> .config
        fi
        make defconfig

    - name: 下载依赖包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo "========== 开始编译 =========="
        echo "当前目标设备："
        grep "CONFIG_TARGET.*DEVICE" .config | grep "=y" | head -3
        
        # 强制指定目标编译
        if [ "${{ github.event.inputs.device }}" = "lubancat-2n" ]; then
          echo "强制编译鲁班猫 2N..."
          make target/linux/compile -j$(nproc) || true
        fi
        
        make -j$(nproc) || make -j1 || make -j1 V=s
        
        echo "========== 编译完成 =========="
        ls -la bin/targets/rockchip/armv8/*.img.gz 2>/dev/null || echo "未找到固件"

    - name: 整理文件
      id: organize
      run: |
        cd openwrt/bin/targets/rockchip/armv8
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "========== 最终固件列表 =========="
        ls -lh *.img.gz
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Artifacts
      if: steps.organize.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: istoreos-${{ github.event.inputs.device || 'all' }}-${{ github.run_id }}
        path: ${{ env.FIRMWARE }}/*.img.gz
        retention-days: 7

    - name: 创建 Release
      if: steps.organize.outputs.status == 'success' && env.ACCESS_TOKEN != ''
      env:
        GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        cd openwrt/bin/targets/rockchip/armv8
        
        TAG_NAME="${{ github.run_id }}-${{ github.event.inputs.device || 'all' }}"
        RELEASE_NAME="iStoreOS ${{ github.event.inputs.device || 'all' }} ${{ github.run_id }}"
        
        echo "创建 Release 到仓库: ${{ env.MY_REPO }}"
        
        gh release create "$TAG_NAME" \
          --repo "${{ env.MY_REPO }}" \
          --title "$RELEASE_NAME" \
          --notes "iStoreOS 编译固件
        设备: ${{ github.event.inputs.device || 'all' }}
        分支: istoreos-24.10
        编译时间: $(date -Iseconds)" \
          *.img.gz
