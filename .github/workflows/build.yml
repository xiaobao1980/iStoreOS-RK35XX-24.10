name: Build iStoreOS

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间 00:00 (UTC+8)
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - h68k
          - h88k
          - r5s
          - r6s
          - r66s
          - lubancat-2n  # 添加鲁班猫 2N

env:
  REPO_URL: https://github.com/istoreos/istoreos
  REPO_BRANCH: istoreos-24.10
  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}  # 使用您的 ACCESS_TOKEN
  GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}  # 同时设置 GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.ACCESS_TOKEN }}  # 使用 ACCESS_TOKEN 检出代码

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev \
          libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex \
          uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev \
          xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler \
          antlr3 gperf wget curl swig rsync
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: 克隆源码
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "src-git istoreos https://github.com/linkease/istore.git" >> feeds.conf.default

    - name: 应用鲁班猫 2N 补丁
      if: github.event.inputs.device == 'lubancat-2n' || github.event.inputs.device == 'all'
      run: |
        # 复制设备树文件
        mkdir -p openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        cp target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/rk3568-lubancat-2n.dts \
           openwrt/target/linux/rockchip/files/arch/arm64/boot/dts/rockchip/
        
        # 应用其他补丁...

    - name: 更新和安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置文件
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && cat $CONFIG_FILE >> openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载依赖包
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到 Release
      uses: softprops/action-gh-release@v1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}  # 使用 ACCESS_TOKEN
      with:
        tag_name: ${{ github.run_id }}
        files: ${{ env.FIRMWARE }}/*
        body: |
          iStoreOS for LubanCat 2N
          编译时间: ${{ github.event.repository.updated_at }}

    - name: 删除旧 Release
      uses: dev-drprasad/delete-older-releases@v0.3.2
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}  # 使用 ACCESS_TOKEN
